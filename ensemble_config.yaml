target: ~/ml_fuzz/fuzz_yyjson
dict: ~/ml_fuzz/json.dict
timeout_ms: 10000
poll_interval_sec: 5

input_ml: ~/maxim_fuzz/ml_corpus/
input_baseline: ~/ml_fuzz/input

output_ml: ~/diff_output/ensemble_v2_ml
output_baseline: ~/diff_output/ensemble_v2_bl

common_env:
  AFL_SKIP_CPUFREQ: "1"
  AFL_NO_AFFINITY: "1"
  AFL_DISABLE_TRIM: "1"

ml_instances:
  - name: exploit
    binary: mlf-fuzz
    role: main
    env:
      MLF_STAGNATION_SEC: "300"
      MLF_TRAINING_LOG: "/tmp/mlf_training_v2_exploit.bin"

  - name: explore
    binary: mlf-fuzz
    role: secondary
    env:
      MLF_STAGNATION_SEC: "0"
      MLF_TRAINING_LOG: "/tmp/mlf_training_v2_explore.bin"

  - name: havoc
    binary: afl-fuzz
    role: secondary
    env: {}

baseline_instances:
  - name: base-M
    binary: afl-fuzz
    role: main
    env: {}

  - name: base-S1
    binary: afl-fuzz
    role: secondary
    env: {}

  - name: base-S2
    binary: afl-fuzz
    role: secondary
    env: {}

# Ensemble vs Baseline configuration
target: /home/alex/ml_fuzz/fuzz_yyjson
input: /home/alex/ml_fuzz/input
dict: /home/alex/ml_fuzz/json.dict
timeout_ms: 10000
poll_interval_sec: 5

# Два отдельных sync_dir — группы НЕ шарят корпус между собой
output_ml: /home/alex/diff_output/ensemble_ml
output_baseline: /home/alex/diff_output/ensemble_bl

# Общие env для всех инстансов
common_env:
  AFL_SKIP_CPUFREQ: "1"
  AFL_NO_AFFINITY: "1"
  AFL_DISABLE_TRIM: "1"

# ML Ensemble (3 инстанса, шарят корпус через output_ml)
ml_instances:
  - name: exploit
    binary: mlf-fuzz
    role: main
    env:
      MLF_STAGNATION_SEC: "300"
      MLF_TRAINING_LOG: "/tmp/mlf_training_exploit.bin"

  - name: explore
    binary: mlf-fuzz
    role: secondary
    env:
      MLF_STAGNATION_SEC: "0"
      MLF_TRAINING_LOG: "/tmp/mlf_training_explore.bin"

  - name: havoc
    binary: afl-fuzz
    role: secondary
    env: {}

# Baseline (3 инстанса, шарят корпус через output_baseline)
baseline_instances:
  - name: base-M
    binary: afl-fuzz
    role: main
    env: {}

  - name: base-S1
    binary: afl-fuzz
    role: secondary
    env: {}

  - name: base-S2
    binary: afl-fuzz
    role: secondary
    env: {}
